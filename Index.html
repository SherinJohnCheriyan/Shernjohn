<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent Decoder</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        p.description {
            font-style: italic;
            color: #666;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        #results {
            margin-top: 30px;
            padding: 20px;
            background: #e8f4fd;
            border-left: 5px solid var(--accent-color);
            display: none;
        }

        .category {
            margin-bottom: 15px;
        }

        .category strong {
            color: var(--primary-color);
            display: block;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Cookie Consent Decoder</h1>
    <p class="description">Paste a cookie policy below to break down the legal jargon into plain language.</p>
    
    <textarea id="policyInput" placeholder="Paste the long, complex cookie policy text here..."></textarea>
    
    <button onclick="decodePolicy()">Analyze Policy</button>

    <div id="results">
        <h3>Simplified Breakdown:</h3>
        <div id="outputContent"></div>
    </div>
</div>

<script>
    function decodePolicy() {
        const text = document.getElementById('policyInput').value.toLowerCase();
        const output = document.getElementById('outputContent');
        const resultsDiv = document.getElementById('results');

        if (!text.trim()) {
            alert("Please paste some text first!");
            return;
        }

        // Patterns and simplified explanations
        const patterns = [
            {
                title: "📊 Data Collection",
                keywords: ['collect', 'personal info', 'ip address', 'location', 'email'],
                explanation: "This site collects your personal details, such as your location or contact info."
            },
            {
                title: "🤝 Third-Party Sharing",
                keywords: ['third party', 'partners', 'affiliates', 'share with', 'vendors'],
                explanation: "Your data may be shared with outside companies or advertising partners."
            },
            {
                title: "🕵️ Tracking & Advertising",
                keywords: ['tracking', 'pixel', 'behavior', 'ads', 'marketing', 'interest-based'],
                explanation: "The site follows your browsing habits to show you targeted advertisements."
            },
            {
                title: "⚖️ Your Rights",
                keywords: ['opt-out', 'your rights', 'delete', 'access', 'gdpr', 'ccpa'],
                explanation: "You have the right to request access to your data or ask for it to be deleted."
            }
        ];

        let htmlResults = "";
        let foundAnything = false;

        patterns.forEach(item => {
            // Check if any keyword in the category exists in the text
            const found = item.keywords.some(keyword => text.includes(keyword));
            
            if (found) {
                htmlResults += `
                    <div class="category">
                        <strong>${item.title}</strong>
                        <span>${item.explanation}</span>
                    </div>
                `;
                foundAnything = true;
            }
        });

        if (!foundAnything) {
            htmlResults = "<p>No specific tracking or data sharing patterns were clearly identified, but always remain cautious!</p>";
        }

        output.innerHTML = htmlResults;
        resultsDiv.style.display = "block";
    }
</script>

</body>
</html>
